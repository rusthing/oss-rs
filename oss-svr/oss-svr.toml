[oss]
file-dir-format = "%Y/%m/%d"
upload-file-limit-size = "100MiB"
upload-buffer-size = "2MiB"
download-buffer-size = "2MiB"

[db]
url = "postgres://ossrs:ossrs@pgsql:5432/ossrs"
#url = "mysql://ossrs:ossrs@mysql:3306/ossrs"

[web-server]
log-enabled = true
bind = "127.0.0.1"
#bind = ["127.0.0.1", "192.168.1.232"]
port = 9840
#listen = "[::1]:9840"
#listen = ["[::1]:9840", "0.0.0.0:9841", "[::]:9842", "192.168.1.169:9843"]
#reuse-port = true
cors.enabled = true
#health-check.exposed = true
forbidden-urns = [
    #    "GET:/oss/bucket/list",
    #    "GET:/oss/obj/list",
    #    "GET:/oss/obj-ref/list",
    "GET:/swagger-ui/"
]
local-only-urns = [
    "GET:/oss/bucket/list",
    "GET:/oss/obj/list",
    "GET:/oss/obj-ref/list"
]
ip-white-list = [
    "127.0.0.1/32",
    "192.168.31.0/24",
]
ip-black-list = [
    "192.168.31.102/32"
]

[web-server.https]
enabled = false
cert = "certs/cert.pem"
key = "certs/key.pem"

[id-worker]
epoch = 1758108749211
machine-id = 1
node-id = 1
